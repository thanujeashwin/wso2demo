# ═══════════════════════════════════════════════════════════════════════════
# MCP Server Definitions – Morrisons WSO2 Agent Manager
#
# Model Context Protocol (MCP) is used as the standard wire protocol
# for all agent tool communication. Each agent exposes an MCP server;
# WSO2 Agent Manager acts as the MCP client (and broker).
#
# Protocol: MCP 2025-03 over Server-Sent Events (SSE)
# Gateway:  WSO2 API Manager proxies all MCP traffic
# Auth:     OAuth2 client credentials per server
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: wso2.com/v1alpha1
kind: MCPServerRegistry
metadata:
  name: morrisons-mcp-registry
  namespace: morrisons-retail

servers:

  # ── SAP ERP MCP Server ───────────────────────────────────────────────────
  - id: mcp-sap-erp
    displayName: "SAP S/4HANA MCP Server"
    agentId: morrisons-sap-erp-agent
    url: https://wso2-apim.morrisons.internal/mcp/sap-erp
    transport: sse
    protocolVersion: "2025-03"
    auth:
      type: oauth2
      tokenUrl: https://wso2-apim.morrisons.internal/token
      clientId: mcp-sap-client
      secretRef: secret/morrisons/mcp-sap-credentials
      scopes: [mcp:tools:invoke, sap:erp:read, sap:erp:write]
    tools:
      - check_stock_level
      - raise_purchase_order
      - get_supplier_info
      - get_goods_movement
      - run_demand_forecast
    healthCheck:
      path: /health
      intervalSecs: 30
    retryPolicy:
      maxRetries: 3
      backoffMs: 500
    timeout: 30s
    cloud: gcp
    region: europe-west2

  # ── Oracle ERP MCP Server ────────────────────────────────────────────────
  - id: mcp-oracle-erp
    displayName: "Oracle Fusion Financials MCP Server"
    agentId: morrisons-oracle-erp-agent
    url: https://wso2-apim.morrisons.internal/mcp/oracle-erp
    transport: sse
    protocolVersion: "2025-03"
    auth:
      type: oauth2
      tokenUrl: https://wso2-apim.morrisons.internal/token
      clientId: mcp-oracle-client
      secretRef: secret/morrisons/mcp-oracle-credentials
      scopes: [mcp:tools:invoke, oracle:financials:read, oracle:financials:write]
    tools:
      - get_budget_availability
      - approve_purchase_order
      - get_cost_centre_report
      - get_invoice_status
      - create_journal_entry
    healthCheck:
      path: /health
      intervalSecs: 30
    retryPolicy:
      maxRetries: 2
      backoffMs: 1000        # Oracle can be slower to recover
    timeout: 45s
    cloud: oci
    region: uk-london-1

  # ── Salesforce MCP Server ────────────────────────────────────────────────
  - id: mcp-salesforce
    displayName: "Salesforce CRM & Marketing Cloud MCP Server"
    agentId: morrisons-salesforce-agent
    url: https://wso2-apim.morrisons.internal/mcp/salesforce
    transport: sse
    protocolVersion: "2025-03"
    auth:
      type: oauth2
      tokenUrl: https://login.salesforce.com/services/oauth2/token
      clientId: ${SALESFORCE_CONNECTED_APP_CLIENT_ID}
      secretRef: secret/morrisons/salesforce-connected-app
      scopes: [api, refresh_token, mcp:tools:invoke]
    tools:
      - get_customer_profile
      - generate_personalised_offer
      - update_customer_segment
      - get_supplier_account
      - log_service_case
    healthCheck:
      path: /health
      intervalSecs: 60
    retryPolicy:
      maxRetries: 3
      backoffMs: 300
    timeout: 20s
    cloud: saas
    rateLimits:
      requestsPerSecond: 25    # Salesforce API governor limits

  # ── AWS Cloud MCP Server ─────────────────────────────────────────────────
  - id: mcp-aws-cloud
    displayName: "AWS Cloud MCP Server (Lambda / Redshift / SNS)"
    agentId: morrisons-aws-cloud-agent
    url: https://wso2-apim.morrisons.internal/mcp/aws-cloud
    transport: sse
    protocolVersion: "2025-03"
    auth:
      type: oauth2
      tokenUrl: https://wso2-apim.morrisons.internal/token
      clientId: mcp-aws-client
      secretRef: secret/morrisons/mcp-aws-credentials
      # AWS-side: API Gateway → Lambda uses IAM role (no long-lived keys)
      awsIamRoleArn: arn:aws:iam::123456789012:role/morrisons-mcp-lambda-role
      scopes: [mcp:tools:invoke, aws:redshift:read, aws:lambda:invoke, aws:sns:publish]
    tools:
      - analyse_sales_trends
      - trigger_lambda_workflow
      - get_s3_report
      - send_sns_notification
      - query_dynamodb_session
    healthCheck:
      path: /health
      intervalSecs: 30
    timeout: 60s               # Lambda cold starts can be slow
    cloud: aws
    region: eu-west-1

  # ── GCP Cloud MCP Server ─────────────────────────────────────────────────
  - id: mcp-gcp-cloud
    displayName: "GCP Cloud MCP Server (BigQuery / Vertex AI / Pub/Sub)"
    agentId: morrisons-gcp-cloud-agent
    url: https://wso2-apim.morrisons.internal/mcp/gcp-cloud
    transport: sse
    protocolVersion: "2025-03"
    auth:
      type: oauth2
      tokenUrl: https://wso2-apim.morrisons.internal/token
      clientId: mcp-gcp-client
      secretRef: secret/morrisons/mcp-gcp-credentials
      # GCP-side: Workload Identity Federation (no service account keys)
      gcpWorkloadIdentityProvider: "//iam.googleapis.com/projects/123456789/locations/global/workloadIdentityPools/wso2-pool/providers/wso2-provider"
      gcpServiceAccount: wso2-agent@morrisons-data-platform.iam.gserviceaccount.com
      scopes: [mcp:tools:invoke, bigquery.jobs.create, aiplatform.endpoints.predict]
    tools:
      - run_bigquery_analytics
      - call_vertex_ai_prediction
      - publish_pubsub_event
      - get_store_iot_data
      - run_document_ai
    healthCheck:
      path: /health
      intervalSecs: 30
    timeout: 90s               # BigQuery jobs can take longer
    cloud: gcp
    region: europe-west2

# ── Tool Discovery Settings ──────────────────────────────────────────────────
toolDiscovery:
  enabled: true
  autoRegister: true             # Agents announce tools on startup via MCP initialize
  cacheRefreshSecs: 60
  toolCatalogUrl: https://wso2-apim.morrisons.internal/mcp/tools

# ── WSO2 Agent Manager as MCP Client ────────────────────────────────────────
mcpClient:
  clientName: "wso2-agent-manager"
  clientVersion: "4.0.0"
  maxConcurrentCalls: 50
  connectionPool:
    perServer: 5
    keepAliveSeconds: 300
