# ═══════════════════════════════════════════════════════════════════════════
# WSO2 Agent Manager – SAP ERP Agent Registration
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: wso2.com/v1alpha1
kind: Agent
metadata:
  name: morrisons-sap-erp-agent
  namespace: morrisons-retail
  labels:
    domain: supply-chain
    system: sap-s4hana
    environment: production
    cloud: gcp                    # SAP runs on GCP at Morrisons

spec:
  description: >
    SAP S/4HANA ERP agent for Morrisons. Manages Materials Management (MM),
    Purchase Orders, Supplier master data, Goods Movements, and Demand Forecasting
    via SAP OData v4 APIs proxied through WSO2 Enterprise Integrator.

  runtime:
    type: python
    image: morrisons/sap-erp-agent:1.2.0
    entrypoint: agents.sap_agent.agent:sap_agent
    replicas: 2
    resources:
      cpu: "500m"
      memory: "512Mi"

  # ── MCP Tool Definitions ─────────────────────────────────────────────────
  tools:
    - name: check_stock_level
      description: Query SAP MM for real-time stock level at a given store.
      inputSchema:
        type: object
        properties:
          sku:      { type: string, description: "SAP Material Number (SKU)" }
          store_id: { type: string, description: "Morrisons store identifier", default: "STORE-001" }
        required: [sku]

    - name: raise_purchase_order
      description: Create a Purchase Order in SAP MM against an approved supplier.
      inputSchema:
        type: object
        properties:
          sku:           { type: string }
          quantity:      { type: integer, minimum: 1 }
          supplier_id:   { type: string }
          delivery_date: { type: string, format: date }
        required: [sku, quantity, supplier_id]

    - name: get_supplier_info
      description: Retrieve vendor master data (name, lead times, payment terms) from SAP BP.
      inputSchema:
        type: object
        properties:
          supplier_id: { type: string }
        required: [supplier_id]

    - name: get_goods_movement
      description: Retrieve recent goods receipts and goods issues from SAP MIGO.
      inputSchema:
        type: object
        properties:
          sku:  { type: string }
          days: { type: integer, default: 7, maximum: 90 }
        required: [sku]

    - name: run_demand_forecast
      description: Pull rolling demand forecast from SAP IBP (Integrated Business Planning).
      inputSchema:
        type: object
        properties:
          sku:           { type: string }
          horizon_days:  { type: integer, default: 90, maximum: 365 }
        required: [sku]

  # ── Backend connection (via WSO2 ESB proxy) ──────────────────────────────
  backendConnection:
    type: odata_v4
    baseUrl: https://s4hana.morrisons.internal/sap/opu/odata/sap
    authType: oauth2_client_credentials
    oauthTokenUrl: https://wso2-apim.morrisons.internal/token
    clientSecretRef: secret/morrisons/sap-oauth-credentials

  # ── Transport ────────────────────────────────────────────────────────────
  transport:
    protocol: mcp-sse                        # MCP over Server-Sent Events
    port: 8080
    path: /mcp/sap-erp
    tls:
      enabled: true
      certRef: secret/morrisons/tls-cert

  # ── Guardrails (agent-level) ─────────────────────────────────────────────
  guardrails:
    maxPOValue: 50000                         # GBP – POs > £50k need human approval
    allowedStores:
      - STORE-*                               # Wildcard – all Morrisons stores
    blockedSkuPatterns:
      - "ALCOHOL-*"                           # Requires separate compliance workflow
    rateLimits:
      requestsPerMinute: 120
      burstSize: 20

  # ── Observability ────────────────────────────────────────────────────────
  observability:
    tracing:
      enabled: true
      exporter: otlp
      endpoint: https://choreo-obs.wso2.morrisons.internal:4318/v1/traces
      samplingRate: 1.0
    metrics:
      enabled: true
      scrapePort: 9090
      path: /metrics
    logging:
      level: INFO
      format: json
      destination: gcp-cloud-logging         # Native GCP logging for SAP agent
