# ═══════════════════════════════════════════════════════════════════════════
# WSO2 Agent Manager – Morrisons Production Configuration
#
# This file defines the complete multi-agent system topology for Morrisons.
# Deployed to: WSO2 Choreo (control plane) + Morrisons GCP / AWS / OCI (data plane)
#
# Architecture overview:
#
#   ┌─────────────────────────────────────────────────────────────────────┐
#   │                    WSO2 Agent Manager Portal                        │
#   │   • Single pane of glass for all agents                             │
#   │   • Model selector (Claude / Gemini / GPT-4 / Nova / Mistral)      │
#   │   • Guardrail dashboard     • Observability (traces, metrics, logs) │
#   └──────────────────────────────┬──────────────────────────────────────┘
#                                  │
#   ┌──────────────────────────────▼──────────────────────────────────────┐
#   │              WSO2 API Manager (Gateway + ESB)                       │
#   │   OAuth2 / JWT  •  Rate limiting  •  TLS termination               │
#   │   MCP protocol routing  •  Service mesh                             │
#   └───┬───────┬──────────┬───────────┬──────────┬────────────────────────┘
#       │       │          │           │          │
#    SAP ERP  Oracle     Salesforce   AWS       GCP
#    (GCP)    (OCI)      (SaaS)    (eu-west-1) (EU)
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: wso2.com/v1alpha1
kind: AgentManagerConfiguration
metadata:
  name: morrisons-agent-manager
  namespace: morrisons-retail
  version: "2.1.0"
  organisation: "Morrisons Supermarkets Plc"

# ── Portal Configuration ────────────────────────────────────────────────────
portal:
  title: "Morrisons AI Agent Manager"
  logo: "https://brand.morrisons.com/logo.svg"
  primaryColour: "#FFD700"      # Morrisons yellow
  secondaryColour: "#004B23"    # Morrisons green
  singleSignOn:
    provider: azure_ad
    tenantId: morrisons-retail
    clientId: ${AZURE_AD_CLIENT_ID}

# ── Available LLM Models (selectable in portal per agent) ───────────────────
models:
  default: claude-sonnet-4-6
  available:
    - id: claude-sonnet-4-6
      provider: Anthropic
      endpoint: https://api.anthropic.com/v1
      contextWindow: 200000
      useCase: "Primary orchestrator – best reasoning for multi-step supply chain"
      secretRef: secret/morrisons/anthropic-key

    - id: gemini-2.0-pro
      provider: Google (Vertex AI)
      endpoint: https://europe-west2-aiplatform.googleapis.com/v1
      contextWindow: 128000
      useCase: "GCP-native tasks, BigQuery SQL generation, Document AI"
      authType: workload_identity
      project: morrisons-data-platform

    - id: amazon-nova-pro
      provider: AWS Bedrock
      endpoint: https://bedrock-runtime.eu-west-1.amazonaws.com
      contextWindow: 300000
      useCase: "AWS-native tasks, Redshift queries, cost-optimised inference"
      authType: iam_role
      roleArn: arn:aws:iam::123456789012:role/morrisons-bedrock-role

    - id: gpt-4o
      provider: Azure OpenAI
      endpoint: https://morrisons-openai.openai.azure.com
      contextWindow: 128000
      useCase: "Fallback / A-B testing against Claude"
      secretRef: secret/morrisons/azure-openai-key

    - id: mistral-large
      provider: Mistral AI
      endpoint: https://api.mistral.ai/v1
      contextWindow: 128000
      useCase: "Cost-optimised tasks, bulk batch processing"
      secretRef: secret/morrisons/mistral-key

# ── Agent Catalogue (registered agents) ─────────────────────────────────────
agents:
  - ref: agents/sap_agent/config.yaml
    displayName: "SAP S/4HANA ERP Agent"
    icon: "sap"
    tags: [supply-chain, erp, gcp]

  - ref: agents/oracle_agent/config.yaml
    displayName: "Oracle Fusion Financials Agent"
    icon: "oracle"
    tags: [finance, erp, oci]

  - ref: agents/salesforce_agent/config.yaml
    displayName: "Salesforce CRM & Marketing Agent"
    icon: "salesforce"
    tags: [crm, customer, saas]

  - ref: agents/aws_agent/config.yaml
    displayName: "AWS Cloud Agent (Redshift / Lambda / SNS)"
    icon: "aws"
    tags: [analytics, cloud, aws]

  - ref: agents/gcp_agent/config.yaml
    displayName: "GCP Cloud Agent (BigQuery / Vertex AI / Pub/Sub)"
    icon: "gcp"
    tags: [analytics, ml, gcp]

  - ref: agents/orchestrator/config.yaml
    displayName: "Morrisons Master Orchestrator"
    icon: "orchestrator"
    tags: [orchestrator, primary]
    isOrchestrator: true

# ── Multi-Agent Workflows ────────────────────────────────────────────────────
workflows:
  - name: supply-chain-reorder
    description: "Automated stock monitoring → PO creation → finance approval pipeline"
    trigger:
      type: scheduled
      cron: "0 */4 * * *"      # Every 4 hours
    steps:
      - agent: morrisons-sap-erp-agent
        tool:  check_stock_level
      - agent: morrisons-gcp-cloud-agent
        tool:  call_vertex_ai_prediction
        parallel: true
      - agent: morrisons-sap-erp-agent
        tool:  raise_purchase_order
        condition: "stock.below_reorder == true"
      - agent: morrisons-oracle-erp-agent
        tool:  approve_purchase_order
      - agent: morrisons-aws-cloud-agent
        tool:  send_sns_notification
        parallel: true
      - agent: morrisons-gcp-cloud-agent
        tool:  publish_pubsub_event
        parallel: true

  - name: store-operations-monitor
    description: "Real-time store health monitoring (IoT + stock + analytics)"
    trigger:
      type: event
      source: morrisons-iot-events
    steps:
      - agent: morrisons-gcp-cloud-agent
        tool:  get_store_iot_data
        parallel: true
      - agent: morrisons-sap-erp-agent
        tool:  check_stock_level
        parallel: true
      - agent: morrisons-gcp-cloud-agent
        tool:  run_bigquery_analytics
        parallel: true

  - name: customer-personalisation
    description: "Real-time offer generation for Morrisons More loyalty members"
    trigger:
      type: event
      source: morrisons-pos-events   # Fired on checkout
    steps:
      - agent: morrisons-salesforce-agent
        tool:  get_customer_profile
        parallel: true
      - agent: morrisons-gcp-cloud-agent
        tool:  call_vertex_ai_prediction
        parallel: true
      - agent: morrisons-salesforce-agent
        tool:  generate_personalised_offer
      - agent: morrisons-gcp-cloud-agent
        tool:  publish_pubsub_event

  - name: finance-procurement-p2p
    description: "End-to-end Purchase-to-Pay workflow"
    trigger:
      type: manual
    steps:
      - agent: morrisons-oracle-erp-agent
        tool:  get_budget_availability
        parallel: true
      - agent: morrisons-salesforce-agent
        tool:  get_supplier_account
        parallel: true
      - agent: morrisons-sap-erp-agent
        tool:  get_supplier_info
        parallel: true
      - agent: morrisons-sap-erp-agent
        tool:  raise_purchase_order
      - agent: morrisons-oracle-erp-agent
        tool:  approve_purchase_order
      - agent: morrisons-gcp-cloud-agent
        tool:  run_document_ai
      - agent: morrisons-oracle-erp-agent
        tool:  create_journal_entry
      - agent: morrisons-aws-cloud-agent
        tool:  send_sns_notification

# ── Global Guardrails ────────────────────────────────────────────────────────
guardrails:
  ref: guardrails/guardrails.py
  inputChecks:
    - promptInjection:     { enabled: true,  severity: BLOCK }
    - piiDetection:        { enabled: true,  severity: BLOCK }
    - restrictedSkus:      { enabled: true,  severity: BLOCK }
    - rbacEnforcement:     { enabled: true,  severity: BLOCK }
    - suspiciousQuantity:  { enabled: true,  severity: BLOCK, maxUnits: 100000 }
  outputChecks:
    - sensitiveFieldMask:  { enabled: true }
    - internalFieldStrip:  { enabled: true, roles: [ADMIN, SYSTEM] }
  auditLog:
    enabled: true
    destination: gcp-cloud-logging
    retentionDays: 365
    includeBlockedRequests: true

# ── MCP Configuration ────────────────────────────────────────────────────────
mcp:
  protocolVersion: "2025-03"
  transport: sse                    # Server-Sent Events
  gatewayUrl: https://wso2-apim.morrisons.internal/mcp
  auth:
    type: oauth2
    tokenUrl: https://wso2-apim.morrisons.internal/token
    scopes: [mcp:read, mcp:write, mcp:admin]
  toolDiscovery:
    enabled: true                   # Agents auto-register their tools on startup
    refreshIntervalSecs: 60

# ── Observability ────────────────────────────────────────────────────────────
observability:
  dashboard: https://choreo.morrisons.wso2.com/obs/morrisons-agents
  tracing:
    protocol: otlp-grpc
    endpoint: https://choreo-obs.wso2.morrisons.internal:4317
    samplingRate: 1.0               # 100% for demo; tune to 0.1 in prod
    propagationFormat: w3c-trace-context
  metrics:
    scrapeInterval: 15s
    prometheusPath: /metrics
    grafanaDashboard: https://grafana.morrisons.internal/d/wso2-agents
  logging:
    format: json
    level: INFO
    destinations:
      - type: gcp-cloud-logging
        project: morrisons-data-platform
        logName: wso2-agent-manager
      - type: aws-cloudwatch
        region: eu-west-1
        logGroup: /morrisons/wso2/agents
      - type: splunk
        hec_url: https://splunk.morrisons.internal:8088

# ── Infrastructure placement ─────────────────────────────────────────────────
deployment:
  controlPlane:
    type: wso2-choreo-cloud
    region: eu-west-2

  dataPlane:
    - name: gcp-primary
      cloud: gcp
      region: europe-west2
      agents: [morrisons-sap-erp-agent, morrisons-gcp-cloud-agent, morrisons-orchestrator]
      cluster: morrisons-gke-prod

    - name: aws-secondary
      cloud: aws
      region: eu-west-1
      agents: [morrisons-aws-cloud-agent]
      cluster: morrisons-eks-prod

    - name: oci-oracle
      cloud: oci
      region: uk-london-1
      agents: [morrisons-oracle-erp-agent]
      cluster: morrisons-oke-prod

    - name: saas-salesforce
      cloud: saas
      agents: [morrisons-salesforce-agent]
      deploymentType: serverless      # Runs as WSO2 Choreo cloud function

# ── Security ──────────────────────────────────────────────────────────────────
security:
  secretManagement:
    provider: gcp-secret-manager
    secretPrefix: "projects/morrisons-data-platform/secrets"
  networkPolicy:
    agentEgress: RESTRICTED         # Agents can only call registered backends
    crossAgentComms: ORCHESTRATOR_ONLY   # Sub-agents cannot call each other directly
  encryption:
    inTransit: tls1.3
    atRest: aes256
  complianceFrameworks: [UK_GDPR, PCI_DSS, ISO_27001]
