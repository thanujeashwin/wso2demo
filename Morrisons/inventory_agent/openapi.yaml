openapi: 3.1.0
info:
  title: Morrisons Inventory Agent
  description: >
    Inventory management agent for Morrisons. Triggered asynchronously by the
    Customer Agent when an order is placed. Reserves warehouse stock against
    the confirmed order, monitors remaining levels, and fires a fire-and-forget
    notification to the Supplier Agent when a product falls below its reorder
    threshold. All tool calls emit OpenTelemetry spans visible in WSO2 Agent
    Manager traces.
  version: 1.0.0
servers:
  - url: http://localhost:8000
paths:
  /chat:
    post:
      summary: Send an inventory management request to the agent
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              reserve_stock:
                summary: Reserve stock for a new order
                value:
                  message: >
                    New order placed. Reserve stock for order ORD-9004.
                    Items: [{"product_id": "PROD-001", "quantity": 2}, {"product_id": "PROD-003", "quantity": 1}]
                  session_id: "notify-ORD-9004"
                  context: {}
              check_levels:
                summary: Check inventory level for a product
                value:
                  message: "Check inventory levels for PROD-001"
                  session_id: "inventory-check-1"
                  context: {}
              release_reservation:
                summary: Release stock reserved for a cancelled order
                value:
                  message: "Order ORD-9002 has been cancelled. Release all stock reservations."
                  session_id: "cancel-ORD-9002"
                  context: {}
      responses:
        '200':
          description: Inventory agent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              examples:
                reserve_success:
                  summary: Stock reserved successfully
                  value:
                    response: >
                      Stock reserved for order ORD-9004.
                      Reserved 2 units of PROD-001 (Morrisons British Whole Milk 4pt) — reservation RES-0012.
                      Reserved 1 unit of PROD-003 (Morrisons Free Range Eggs 6pk) — reservation RES-0013.
                      Inventory check complete: PROD-001 available stock is 8 units (below reorder point of 10) — supplier notification dispatched.
        '422':
          description: Validation error
        '500':
          description: Internal server error
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Inventory agent is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /tools:
    get:
      summary: List available tools
      operationId: listTools
      responses:
        '200':
          description: Tool registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolsResponse'
components:
  schemas:
    ChatRequest:
      type: object
      required:
        - message
        - session_id
      properties:
        message:
          type: string
          minLength: 1
          description: >
            Natural-language instruction. Typically an order notification from
            the Customer Agent containing an order ID and item list, or an ad-hoc
            inventory query.
        session_id:
          type: string
          description: Unique session / conversation identifier
        context:
          type: object
          description: Optional context (passed through from the originating agent)
          additionalProperties: true
    ChatResponse:
      type: object
      required:
        - response
      properties:
        response:
          type: string
          description: Agent response summarising the inventory actions taken
        session_id:
          type: string
        agent:
          type: string
          example: inventory_agent
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        agent:
          type: string
          example: inventory_agent
    ToolsResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
    ToolDefinition:
      type: object
      properties:
        name:
          type: string
          enum:
            - reserve_stock
            - check_inventory_levels
            - release_reservation
        description:
          type: string
        parameters:
          type: object
          additionalProperties: true
